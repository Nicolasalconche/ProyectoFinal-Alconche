                  <div class="u-wrapper">
                    <div class="contact-content">
                      <form id="form" class="form" action="https://formspree.io/f/moqbrrdn" method="POST">
                        <h3 class="tag"><span>CONSULTANOS</span></h3>
                        <label for="name">Nombre Completo <span>*</span></label>
                        <input name="name" required type="text" id="name" placeholder="Nombre y Apellido">
                        <label for="email">Correo electrónico <span>*</span></label>
                        <input name="email" type="text" id="email" required placeholder="usuario@gmail.com">
                        <label for="message">Consultas y dudas:</label>
                        <textarea id="message" name="message" id="" cols="30" rows="10"></textarea>
                        <button type="submit" class="btn primary full" id="btn">enviar mensaje</button>
                      </form>
                    </div>
                  </div>
                </section>
              <div id="rei">
                <a href="#inicio"><button id="reiniciar">Volver</button></a>
              </div>       
              <div class="modal fade" id="idModalAgregarMueble" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title" id="exampleModalLabel">Agregar Mueble</h5>
                      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="modal-body">
                      <form id="añadirMueble">
                        <div class="mb-3">
                          <label for="modelo" class="form-label">Modelo</label>
                          <input type="text" class="form-control" id="tipoInput" aria-describedby="modelo">
                          
                        </div>
                        <div class="mb-3">
                          <label for="tipo" class="form-label">Tipo</label>
                          <input type="text" class="form-control" id="modeloInput" aria-describedby="tipo">              
                        </div>
                        <div class="mb-3">
                          <label for="precio" class="form-label">Precio:</label>
                          <input type="text" class="form-control" id="precioInput" aria-describedby="precio">
                        </div>
                      </form>
                    </div>
                    
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                      <button type="text" id="guardarMuebleBtn" class="btn btn-success" data-bs-dismiss="modal">Guardar Mueble</button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="modal fade" id="idModalCarrito" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">

                    </div>
                    <div class="modal-body" id="carrito">
                      
                    </div>
                    <div class="row ml-ato">
                      <p id="totalCompra"></p>
                    </div>
                    <div class="modal-footer">  
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Salir</button>
                      <button type="button" data-bs-dismiss="modal" class="btn btn-success" id="botonFinalizarCompra">Finalizar Compra</button>
                    </div>
                  </div>
                </div>
